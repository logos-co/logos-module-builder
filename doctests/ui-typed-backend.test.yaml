name: "Tutorial: A UI App with a Typed Backend (interface: universal)"
output: ui-typed-backend.md
project_name: ui-typed-backend
release: ""

intro: |
  UI plugin backends have always been able to call core modules — but the
  plumbing was manual: implement `initLogos(LogosAPI*)`, construct
  `LogosModules` yourself, write the `.rep`, the interface class, the plugin
  glue. This doc-test shows the **universal authoring model for UI modules**:
  set `"type": "ui_qml"` + `"interface": "universal"` and write ONE clean C++
  class. Everything else — the `.rep` (derived from your class), the plugin
  glue, the typed-SDK wiring — is generated.

  The backend impl gets the same surface a universal core module gets:

  - `modules()` — **typed method callers** for `dependencies`
  - typed **event subscriptions** (`modules().dep.on<Event>(...)`)
  - `bind_<interface>()` for `interface_dependencies`
  - `onContextReady()` — fires when the backend is wired, so subscriptions
    are live before the view makes its first call

  The cast: `tick_module`, a tiny universal core module with one method and
  one typed event — and `ticker_panel`, the UI module whose backend calls it
  and subscribes to it, surfaced in a QML view.

what_you_build: "A QML UI app whose C++ backend is a single clean impl class: typed calls into a core module, a typed event subscription armed in onContextReady, zero hand-written plugin plumbing."

what_you_learn:
  - "interface: universal for type: ui_qml — the backend impl class IS the module; the .rep and all plugin glue are generated from it"
  - Typed method callers and typed event subscriptions from a UI backend, identical to a universal core module
  - "onContextReady() in a UI backend: fires when ui-host hands the backend its LogosAPI — arm subscriptions there"
  - How the generated .rep slots surface your impl methods to QML (via logos.watch on the typed replica)

prerequisites:
  - |
    **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:

    ```bash
    mkdir -p ~/.config/nix
    echo 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf
    ```
  - "**A Linux or macOS machine.** Nix provides every toolchain (Qt, CMake) during the builds."

sections:
  - title: "The core module (`tick_module`)"
    step: true
    text: |
      A minimal universal core module: `bump()` increments a counter, returns
      it, and emits the new value as a typed `ticked` event.
    steps:
      - title: "The impl"
        file:
          path: tick-module/src/tick_module_impl.h
          language: cpp
          content: |
            #pragma once
            #include <cstdint>
            #include "logos_module_context.h"

            class TickModuleImpl : public LogosModuleContext {
            public:
                /// Increment the counter, emit it as a `ticked` event, return it.
                int64_t bump();

            logos_events:
                /// Emitted by bump() with the new counter value.
                void ticked(int64_t count);

            private:
                int64_t m_count = 0;
            };
      - file:
          path: tick-module/src/tick_module_impl.cpp
          language: cpp
          content: |
            #include "tick_module_impl.h"

            int64_t TickModuleImpl::bump()
            {
                ++m_count;
                // The generated event body routes the typed payload to every
                // subscriber — including the UI backend below.
                ticked(m_count);
                return m_count;
            }
      - title: "metadata.json + CMakeLists.txt + flake.nix"
        file:
          path: tick-module/metadata.json
          language: json
          content: |
            {
              "name": "tick_module",
              "version": "1.0.0",
              "description": "A counter that announces every bump as a typed event",
              "author": "Logos Core Team",
              "type": "core",
              "interface": "universal",
              "category": "general",
              "main": "tick_module_plugin",
              "dependencies": [],
              "include": [],
              "capabilities": [],
              "nix": {
                "external_libraries": [],
                "packages": { "build": [], "runtime": [] },
                "cmake": { "find_packages": [], "extra_include_dirs": [] }
              }
            }
      - file:
          path: tick-module/CMakeLists.txt
          language: cmake
          content: |
            cmake_minimum_required(VERSION 3.14)
            project(TickModulePlugin LANGUAGES CXX)

            if(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})
                include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)
            else()
                message(FATAL_ERROR "LOGOS_MODULE_BUILDER_ROOT is not set.")
            endif()

            logos_module(
                NAME tick_module
                SOURCES
                    src/tick_module_impl.h
                    src/tick_module_impl.cpp
            )
      - file:
          path: tick-module/flake.nix
          language: nix
          content: |
            {
              description = "tick_module — a counter with a typed event";

              inputs = {
                logos-module-builder.url = "github:logos-co/logos-module-builder{release}";
              };

              outputs = inputs@{ self, logos-module-builder, ... }:
                logos-module-builder.lib.mkLogosModule {
                  src = ./.;
                  configFile = ./metadata.json;
                  flakeInputs = inputs;
                };
            }
      - title: "Build it"
        run: "sh -c 'cd tick-module && printf \"result\\nresult-*\\n\" > .gitignore && git init -q && git add -A && nix flake update && git add flake.lock && nix build'"
        code_block: |
          cd tick-module
          git init && git add -A && nix flake update && git add flake.lock
          nix build

  - title: "The UI module (`ticker_panel`) — one clean class"
    step: true
    text: |
      This is the whole backend. No `.rep`, no plugin classes, no
      `initLogos`, no `LogosAPI` — public methods become the view API
      (surfaced to QML through a generated QtRO contract), and the
      dependency surface is the same one core modules get.
    steps:
      - title: "The impl"
        file:
          path: ticker-panel/src/ticker_panel_impl.h
          language: cpp
          content: |
            #pragma once
            #include <cstdint>
            #include "logos_module_context.h"

            // UI backend, universal style: this class IS the module. The builder
            // derives the .rep from the public methods and generates the plugin
            // glue that wires modules()/onContextReady on initLogos.
            class TickerPanelImpl : public LogosModuleContext {
            public:
                /// Typed call into the core module; returns the new count.
                int64_t bump();

                /// Last value captured from tick_module's typed `ticked` event.
                int64_t lastTick();

                /// Fires when ui-host hands the backend its LogosAPI — the typed
                /// dependency surface is live, so arm subscriptions here.
                void onContextReady() override;

            private:
                int64_t m_lastTick = -1;
            };
      - file:
          path: ticker-panel/src/ticker_panel_impl.cpp
          language: cpp
          content: |
            #include "ticker_panel_impl.h"

            // Generated umbrella: LogosModules (behind modules()) from
            // metadata.json#dependencies — typed wrappers + typed event accessors.
            #include "logos_sdk.h"

            int64_t TickerPanelImpl::bump()
            {
                return modules().tick_module.bump();
            }

            int64_t TickerPanelImpl::lastTick()
            {
                return m_lastTick;
            }

            void TickerPanelImpl::onContextReady()
            {
                modules().tick_module.onTicked([this](int64_t count) {
                    m_lastTick = count;
                });
            }
        post_text: |
          Compare with the classic UI-backend pattern (Part 3 of the tutorial
          series): the `.rep` file, the `SimpleSource`/interface/`ViewPluginBase`
          inheritance triple, `initLogos`, and the manual `LogosModules`
          construction are all gone — and typed **event subscription** is new
          surface a hand-wired backend never had.
      - title: "The QML view"
        file:
          path: ticker-panel/src/qml/Main.qml
          language: qml
          content: |
            import QtQuick
            import QtQuick.Controls
            import QtQuick.Layouts

            Rectangle {
                id: root
                width: 420
                height: 280
                color: "#1e1e2e"

                readonly property var backend: logos.module("ticker_panel")
                property bool ready: false
                property string count: "-"
                property string lastTick: "-"

                Connections {
                    target: logos
                    function onViewModuleReadyChanged(moduleName, isReady) {
                        if (moduleName === "ticker_panel")
                            root.ready = isReady && root.backend !== null
                    }
                }
                Component.onCompleted: {
                    root.ready = root.backend !== null && logos.isViewModuleReady("ticker_panel")
                }

                // Poll the backend's event-captured state so the label updates
                // without user interaction once the typed event lands.
                Timer {
                    interval: 500; running: root.ready; repeat: true
                    onTriggered: logos.watch(root.backend.lastTick(),
                        function(v) { root.lastTick = String(v) }, function(e) {})
                }

                ColumnLayout {
                    anchors.fill: parent
                    anchors.margins: 24
                    spacing: 16

                    Text {
                        text: "Ticker Panel (typed backend)"
                        font.pixelSize: 20
                        color: "#ffffff"
                        Layout.alignment: Qt.AlignHCenter
                    }

                    Text {
                        text: root.ready ? "Connected" : "Connecting to backend..."
                        color: root.ready ? "#56d364" : "#f0883e"
                        font.pixelSize: 12
                        Layout.alignment: Qt.AlignHCenter
                    }

                    Button {
                        text: "Bump"
                        enabled: root.ready
                        Layout.alignment: Qt.AlignHCenter
                        onClicked: logos.watch(root.backend.bump(),
                            function(v) { root.count = String(v) }, function(e) {})
                    }

                    Text {
                        text: "Count: " + root.count
                        color: "#89b4fa"
                        font.pixelSize: 16
                        Layout.alignment: Qt.AlignHCenter
                    }

                    Text {
                        text: "Last tick event: " + root.lastTick
                        color: "#f9e2af"
                        font.pixelSize: 16
                        Layout.alignment: Qt.AlignHCenter
                    }

                    Item { Layout.fillHeight: true }
                }
            }
      - title: "metadata.json — the two lines that matter"
        file:
          path: ticker-panel/metadata.json
          language: json
          content: |
            {
              "name": "ticker_panel",
              "version": "1.0.0",
              "description": "QML panel with a typed universal backend for tick_module",
              "author": "Logos Core Team",
              "type": "ui_qml",
              "interface": "universal",
              "category": "tools",
              "main": "ticker_panel_plugin",
              "view": "qml/Main.qml",
              "icon": "icons/panel.png",
              "dependencies": ["tick_module"],

              "nix": {
                "packages": { "build": [], "runtime": [] },
                "external_libraries": [],
                "cmake": {
                  "find_packages": [],
                  "extra_sources": [],
                  "extra_include_dirs": [],
                  "extra_link_libraries": []
                }
              }
            }
        post_text: |
          `"type": "ui_qml"` + `"interface": "universal"` selects the typed
          backend path. With the legacy default (`"interface"` absent), existing
          `initLogos(LogosAPI*)` UI plugins build exactly as before.
      - run: "mkdir -p ticker-panel/icons && printf 'iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAmElEQVR4nO3QMREAIBDAsFeEN3ziCWRkoEP2XmedfX82OkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAK0BOkBrgA7QGqADtAboAO0BN/SiO/PatoIAAAAASUVORK5CYII=' | base64 -d > ticker-panel/icons/panel.png"
        code_block: "mkdir -p icons && cp your-icon.png icons/panel.png"
      - title: "CMakeLists.txt — REP_FILE points at the GENERATED contract"
        file:
          path: ticker-panel/CMakeLists.txt
          language: cmake
          content: |
            cmake_minimum_required(VERSION 3.14)
            project(TickerPanelPlugin LANGUAGES CXX)

            if(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})
                include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)
            else()
                message(FATAL_ERROR "LOGOS_MODULE_BUILDER_ROOT is not set.")
            endif()

            logos_module(
                NAME ticker_panel
                REP_FILE generated_code/ticker_panel.rep
                SOURCES
                    src/ticker_panel_impl.h
                    src/ticker_panel_impl.cpp
            )
        post_text: |
          The `.rep` is generated into `generated_code/` from your impl header
          before CMake runs; the generated glue sources in the same directory
          are compiled automatically.
      - file:
          path: ticker-panel/flake.nix
          language: nix
          content: |
            {
              description = "ticker_panel — QML UI with a typed universal backend";

              inputs = {
                logos-module-builder.url = "github:logos-co/logos-module-builder{release}";
                # Placeholder — locked to the real checkout in the build step via
                # --override-input (nix rejects relative paths here).
                tick_module.url = "path:/path/to/tick-module";
              };

              outputs = inputs@{ logos-module-builder, tick_module, ... }:
                logos-module-builder.lib.mkLogosQmlModule {
                  src = ./.;
                  configFile = ./metadata.json;
                  flakeInputs = inputs;
                };
            }
      - title: "Lock and build"
        run: "sh -c 'cd ticker-panel && printf \"result\\nresult-*\\n\" > .gitignore && git init -q && git add -A && nix flake update --override-input tick_module path:$PWD/../tick-module && git add flake.lock && nix build --override-input tick_module path:$PWD/../tick-module'"
        code_block: |
          cd ticker-panel
          git init && git add -A
          nix flake update --override-input tick_module path:../tick-module
          git add flake.lock
          nix build

  - title: "Launch and verify"
    step: true
    text: |
      Run the app and drive it: **Bump** goes QML → generated replica →
      generated glue → your impl → typed wrapper → `tick_module`; the typed
      `ticked` event flows back into the subscription `onContextReady()`
      armed — before the view made its first call.
    steps:
      - title: "Launch and drive the app"
        ui_test:
          launch: "sh -c 'cd ticker-panel && nix run .'"
          setup:
            - "nix build 'github:logos-co/logos-qt-mcp{release}' -o result-mcp"
          qt_mcp: "result-mcp"
          tests:
            - name: "App window opens"
              action: wait_for
              texts: ["Ticker Panel (typed backend)"]
              timeout: 30000
            - name: "Backend connects"
              action: wait_for
              texts: ["Connected"]
              timeout: 15000
            - name: "Bump once"
              action: click
              target: "Bump"
            - name: "Typed call returned 1"
              action: wait_for
              texts: ["Count: 1"]
              timeout: 10000
            - name: "Bump again"
              action: click
              target: "Bump"
            - name: "Typed call returned 2"
              action: wait_for
              texts: ["Count: 2"]
              timeout: 10000
            - name: "The typed event arrived in the backend"
              action: wait_for
              texts: ["Last tick event: 2"]
              timeout: 10000
              screenshot: "ticker-panel.png"
        post_text: |
          `Last tick event: 2` is the payoff: `tick_module` emitted its typed
          `ticked` event on each bump, and the backend's
          `modules().tick_module.onTicked(...)` subscription — registered in
          `onContextReady()`, with no manual plumbing anywhere — captured it.
          A UI plugin backend now has the full typed surface of a universal
          core module.
