, "note": ""}]}]}, {"meta": {"name": "Wrapping an External Library \u2014 2. Prebuilt Binaries (Multi-Platform)", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Wrapping an External Library \u2014 2. Prebuilt Binaries (Multi-Platform)\n\nThe second of four tutorials on wrapping a C library as a Logos module. All\nfour wrap the same `libgreet` (`const char* greet_hello(void)` \u2192 `\"hello from\nlibgreet\"`); they differ in **how the library reaches the build**.\n\nHere you wrap a library you only have as **prebuilt binaries** committed in the\nrepo \u2014 and ship builds for several platforms at once. The catch this solves:\n`linux x86_64` and `linux aarch64` both name their library `libgreet.so`, so\nthey can't both live flat in `lib/`. The builder disambiguates them with\n**per-platform subdirectories named by Nix system**.\n\n**What you'll build:** A `greet_module` that links a prebuilt `libgreet`, vendored under `lib/<nix-system>/` so multiple platforms coexist.\n\n**What you'll learn:**\n\n- How to vendor a prebuilt shared library in a module\n- How to ship binaries for several platforms without filename collisions\n- That the build auto-selects the binary matching the platform it builds for\n\n## Prerequisites\n\n- **Nix** with flakes enabled, and a C compiler (to produce the example binary).", "execs": []}, {"md": "## Step 1: Create the project and the library header\n\nWe wrap a prebuilt binary, so the repo ships the shared library plus its\nheader. The header stays flat in `lib/`; the binaries go in per-platform\nsubdirectories.", "execs": []}, {"md": "```bash\nmkdir greet-module-binaries && cd greet-module-binaries\n```", "execs": [{"kind": "run", "cmd": "mkdir -p greet-module-binaries && cd greet-module-binaries", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 1.1 The library header (flat)\n\n```c\n#ifndef GREET_H\n#define GREET_H\n#ifdef __cplusplus\nextern \"C\" {\n#endif\nconst char* greet_hello(void);\n#ifdef __cplusplus\n}\n#endif\n#endif\n```", "execs": [{"kind": "file", "cmd": "write lib/greet.h", "status": "pass", "note": "Wrote lib/greet.h"}]}, {"md": "### 1.2 A throwaway source to produce the example binary\n\nIn a real project the `.so`/`.dylib` comes from elsewhere (a vendor, a\nCI artifact, a cross-compile). For this tutorial we generate one from a\ntiny source we then discard.\n\n```c\n#include \"lib/greet.h\"\nconst char* greet_hello(void) {\n    return \"hello from libgreet\";\n}\n```", "execs": [{"kind": "file", "cmd": "write greet.c", "status": "pass", "note": "Wrote greet.c"}]}, {"md": "## Step 2: Vendor the binary per platform\n\nPlace each platform's binary under `lib/<nix-system>/`, where `<nix-system>`\nis one of `x86_64-linux`, `aarch64-linux`, `x86_64-darwin`,\n`aarch64-darwin`. The build picks the subdirectory matching the system it\nbuilds for. (These are **Nix** system strings \u2014 not the `.lgx` variant\nlabels like `linux-amd64`.)", "execs": []}, {"md": "### 2.1 Build libgreet into its per-platform subdirectory\n\nName the subdirectory after the Nix system so several platforms can sit\nside by side. Here we build only the current platform's binary; in\nproduction you commit one per platform you support.\n\n```bash\n# Name the subdir after the Nix system (so platforms don't collide):\nSYS=$(nix eval --impure --raw --expr builtins.currentSystem)\nmkdir -p \"lib/$SYS\"\ncc -shared -fPIC -o \"lib/$SYS/libgreet.so\" greet.c\n\n# Repeat per platform you ship, e.g.:\n#   lib/x86_64-linux/libgreet.so\n#   lib/aarch64-linux/libgreet.so\n#   lib/x86_64-darwin/libgreet.dylib\n#   lib/aarch64-darwin/libgreet.dylib\n```\n\nThe header is flat at `lib/greet.h`; only the binaries are per-platform.\nDon't also commit a flat `lib/libgreet.<ext>` \u2014 use the subdirs *or* a\nflat binary for a given library, not both.", "execs": [{"kind": "run", "cmd": "SYS=$(nix eval --impure --raw --expr builtins.currentSystem) && mkdir -p \"lib/$SYS\" && cc -shared -fPIC -o \"lib/$SYS/libgreet.so\" greet.c && rm -f greet.c && ls -R lib", "status": "pass", "exit_code": 0, "output": "lib:\ngreet.h\nx86_64-linux\n\nlib/x86_64-linux:\nlibgreet.so\n", "note": ""}]}, {"md": "## Step 3: Write the module", "execs": []}, {"md": "### 3.1 metadata.json\n\nDeclare the vendored library with `vendor_path: lib`. That's the same as\na single-platform vendored lib \u2014 the per-platform selection is automatic.\n\n```json\n{\n  \"name\": \"greet_module\",\n  \"version\": \"1.0.0\",\n  \"type\": \"core\",\n  \"category\": \"general\",\n  \"description\": \"Greeter module wrapping a prebuilt libgreet (vendored per-platform)\",\n  \"main\": \"greet_module_plugin\",\n  \"interface\": \"universal\",\n  \"dependencies\": [],\n\n  \"nix\": {\n    \"packages\": { \"build\": [], \"runtime\": [] },\n    \"external_libraries\": [\n      { \"name\": \"greet\", \"vendor_path\": \"lib\" }\n    ],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": [],\n      \"extra_include_dirs\": [\"lib\"],\n      \"extra_link_libraries\": []\n    }\n  }\n}\n```", "execs": [{"kind": "file", "cmd": "write metadata.json", "status": "pass", "note": "Wrote metadata.json"}]}, {"md": "### 3.2 CMakeLists.txt\n\n`EXTERNAL_LIBS greet` links the vendored library and bundles it next to the plugin.\n\n```cmake\ncmake_minimum_required(VERSION 3.14)\nproject(GreetModulePlugin LANGUAGES CXX)\n\nif(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})\n    include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)\nelseif(EXISTS \"${CMAKE_CURRENT_SOURCE_DIR}/cmake/LogosModule.cmake\")\n    include(cmake/LogosModule.cmake)\nelse()\n    message(FATAL_ERROR \"LogosModule.cmake not found\")\nendif()\n\nlogos_module(\n    NAME greet_module\n    SOURCES\n        src/greet_module_impl.h\n        src/greet_module_impl.cpp\n    EXTERNAL_LIBS\n        greet\n)\n```", "execs": [{"kind": "file", "cmd": "write CMakeLists.txt", "status": "pass", "note": "Wrote CMakeLists.txt"}]}, {"md": "### 3.3 flake.nix\n\n```nix\n{\n  description = \"Greeter module - wraps a prebuilt libgreet (vendored per-platform)\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder/84630f4b6ff14d14114b29c34608b21e46a225ed\";\n  };\n\n  outputs = inputs@{ logos-module-builder, ... }:\n    logos-module-builder.lib.mkLogosModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n    };\n}\n```", "execs": [{"kind": "file", "cmd": "write flake.nix", "status": "pass", "note": "Wrote flake.nix"}]}, {"md": "### 3.4 src/greet_module_impl.h\n\n```cpp\n#pragma once\n\n#include <string>\n#include <logos_module_context.h>\n\nextern \"C\" {\n    #include \"lib/greet.h\"\n}\n\nclass GreetModuleImpl : public LogosModuleContext {\npublic:\n    GreetModuleImpl() = default;\n    ~GreetModuleImpl() = default;\n\n    /// Returns the greeting string from the wrapped libgreet library.\n    std::string hello();\n};\n```", "execs": [{"kind": "file", "cmd": "write src/greet_module_impl.h", "status": "pass", "note": "Wrote src/greet_module_impl.h"}]}, {"md": "### 3.5 src/greet_module_impl.cpp\n\n```cpp\n#include \"greet_module_impl.h\"\n\nstd::string GreetModuleImpl::hello()\n{\n    return std::string(greet_hello());\n}\n```", "execs": [{"kind": "file", "cmd": "write src/greet_module_impl.cpp", "status": "pass", "note": "Wrote src/greet_module_impl.cpp"}]}, {"md": "## Step 4: Build the module", "execs": []}, {"md": "### 4.1 Initialize the git repo\n\nNix flakes only see git-tracked files \u2014 including the vendored binary.\n\n```text\nresult\nresult-*\nbuild/\n```", "execs": [{"kind": "file", "cmd": "write .gitignore", "status": "pass", "note": "Wrote .gitignore"}]}, {"md": "```bash\ngit init\n```", "execs": [{"kind": "run", "cmd": "git init", "status": "pass", "exit_code": 0, "output": "hint: Using 'master' as the name for the initial branch. This default branch name\nhint: will change to \"main\" in Git 3.0. To configure th \n```bash\nnix build 'github:logos-co/logos-logoscore-cli#cli-bundle-dir' --out-link ./logos\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli#cli-bundle-dir' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore -D -m ./modules &\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore -D -m ./modules &", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore load-module greet_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module greet_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"greet_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore call greet_module hello\n```\n\nThe vendored, per-platform binary was linked and loaded \u2014 `hello()`\nreturns the string from `greet_hello()` in `libgreet`.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call greet_module hello", "status": "fail", "exit_code": 4, "output": "{\"code\":\"METHOD_FAILED\",\"message\":\"Call to greet_module.hello failed.\",\"status\":\"error\"}\n", "note": "exit code 4"}]}, {"md": "```bash\n./logos/bin/logoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}]}, {"meta": {"name": "Wrapping an External Library \u2014 3. External Source (build with make)", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Wrapping an External Library \u2014 3. External Source (build with make)\n\nThe third of four tutorials on wrapping a C library as a Logos module. All four\nwrap the same `libgreet` (`const char* greet_hello(void)` \u2192 `\"hello from\nlibgreet\"`); they differ in **how the library reaches the build**.\n\nHere the library's **source lives in a separate repository** with its own build\nsystem. You pin it as a flake input and the builder runs its `build_command`\n(e.g. `make`) during the Nix build.\n\n> In a real project the library is a github flake-input\n> (`greet = { url = \"github:org/libgreet\"; flake = false; }`). For a\n> self-contained, runnable tutorial we keep the \"external repo\" in a local\n> `greet-src/` directory and point the build at it with `--override-input`.\n\n**What you'll build:** A `greet_module` that builds an external C library from source with `make` and links it.\n\n**What you'll learn:**\n\n- How to wrap a library whose source lives in another repo\n- How `build_command` + `output_pattern` drive the external build\n- How `externalLibInputs` wires the source repo into the module build\n\n## Prerequisites\n\n- **Nix** with flakes enabled, and `make` + a C compiler (provided by the Nix build).", "execs": []}, {"md": "## Step 1: The external library repo\n\nThis stands in for a separate library repository: a header, a source, and a\n`Makefile` that emits a shared library under `build/`.", "execs": []}, {"md": "```bash\nmkdir greet-module-make && cd greet-module-make\n```", "execs": [{"kind": "run", "cmd": "mkdir -p greet-module-make/greet-src && cd greet-module-make", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 1.1 greet-src/greet.h\n\n```c\n#ifndef GREET_H\n#define GREET_H\n#ifdef __cplusplus\nextern \"C\" {\n#endif\nconst char* greet_hello(void);\n#ifdef __cplusplus\n}\n#endif\n#endif\n```", "execs": [{"kind": "file", "cmd": "write greet-src/greet.h", "status": "pass", "note": "Wrote greet-src/greet.h"}]}, {"md": "### 1.2 greet-src/greet.c\n\n```c\n#include \"greet.h\"\nconst char* greet_hello(void) {\n    return \"hello from libgreet\";\n}\n```", "execs": [{"kind": "file", "cmd": "write greet-src/greet.c", "status": "pass", "note": "Wrote greet-src/greet.c"}]}, {"md": "### 1.3 greet-src/Makefile\n\n`make` emits `build/libgreet.{so,dylib}`. `$(CC)` comes from the Nix\nstdenv. A SONAME / `install_name` of the bare filename lets the plugin\nrecord a relocatable dependency.\n\n```makefile\nCC ?= cc\nUNAME_S := $(shell uname -s)\nifeq ($(UNAME_S),Darwin)\n  EXT := dylib\n  SOFLAGS := -dynamiclib -install_name @rpath/libgreet.dylib\nelse\n  EXT := so\n  SOFLAGS := -shared -Wl,-soname,libgreet.so\nendif\n\nall: build/libgreet.$(EXT)\nbuild/libgreet.$(EXT): greet.c greet.h\n\tmkdir -p build\n\t$(CC) -fPIC $(SOFLAGS) -o build/libgreet.$(EXT) greet.c\n```", "execs": [{"kind": "file", "cmd": "write greet-src/Makefile", "status": "pass", "note": "Wrote greet-src/Makefile"}]}, {"md": "## Step 2: Write the module", "execs": []}, {"md": "### 2.1 metadata.json\n\nDeclare the library with a `build_command` and where its output lands.\n\n```json\n{\n  \"name\": \"greet_module\",\n  \"version\": \"1.0.0\",\n  \"type\": \"core\",\n  \"category\": \"general\",\n  \"description\": \"Greeter module wrapping an external libgreet source (built with make)\",\n  \"main\": \"greet_module_plugin\",\n  \"interface\": \"universal\",\n  \"dependencies\": [],\n\n  \"nix\": {\n    \"packages\": { \"build\": [], \"runtime\": [] },\n    \"external_libraries\": [\n      {\n        \"name\": \"greet\",\n        \"build_command\": \"make\",\n        \"output_pattern\": \"build/libgreet.*\"\n      }\n    ],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": [],\n      \"extra_include_dirs\": [\"lib\"],\n      \"extra_link_libraries\": []\n    }\n  }\n}\n```", "execs": [{"kind": "file", "cmd": "write metadata.json", "status": "pass", "note": "Wrote metadata.json"}]}, {"md": "### 2.2 CMakeLists.txt\n\n```cmake\ncmake_minimum_required(VERSION 3.14)\nproject(GreetModulePlugin LANGUAGES CXX)\n\nif(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})\n    include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)\nelseif(EXISTS \"${CMAKE_CURRENT_SOURCE_DIR}/cmake/LogosModule.cmake\")\n    include(cmake/LogosModule.cmake)\nelse()\n    message(FATAL_ERROR \"LogosModule.cmake not found\")\nendif()\n\nlogos_module(\n    NAME greet_module\n    SOURCES\n        src/greet_module_impl.h\n        src/greet_module_impl.cpp\n    EXTERNAL_LIBS\n        greet\n)\n```", "execs": [{"kind": "file", "cmd": "write CMakeLists.txt", "status": "pass", "note": "Wrote CMakeLists.txt"}]}, {"md": "### 2.3 flake.nix\n\nAdd the source repo as a **non-flake** input and pass it via\n`externalLibInputs`. Because it is raw source (not a Nix derivation), the\nbuilder runs the `build_command` (`make`).\n\n```nix\n{\n  description = \"Greeter module - external libgreet source built with make\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder/84630f4b6ff14d14114b29c34608b21e46a225ed\";\n    greet = {\n      url = \"github:example/libgreet\";\n      flake = false;\n    };\n  };\n\n  outputs = inputs@{ logos-module-builder, ... }:\n    logos-module-builder.lib.mkLogosModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n      externalLibInputs = {\n        greet = inputs.greet;\n      };\n    };\n}\n```", "execs": [{"kind": "file", "cmd": "write flake.nix", "status": "pass", "note": "Wrote flake.nix"}]}, {"md": "### 2.4 src/greet_module_impl.h\n\nThe header comes from the external build (staged into `lib/`).\n\n```cpp\n#pragma once\n\n#include <string>\n#include <logos_module_context.h>\n\nextern \"C\" {\n    #include \"lib/greet.h\"\n}\n\nclass GreetModuleImpl : public LogosModuleContext {\npublic:\n    GreetModuleImpl() = default;\n    ~GreetModuleImpl() = default;\n\n    /// Returns the greeting string from the wrapped libgreet library.\n    std::string hello();\n};\n```", "execs": [{"kind": "file", "cmd": "write src/greet_module_impl.h", "status": "pass", "note": "Wrote src/greet_module_impl.h"}]}, {"md": "### 2.5 src/greet_module_impl.cpp\n\n```cpp\n#include \"greet_module_impl.h\"\n\nstd::string GreetModuleImpl::hello()\n{\n    return std::string(greet_hello());\n}\n```", "execs": [{"kind": "file", "cmd": "write src/greet_module_impl.cpp", "status": "pass", "note": "Wrote src/greet_module_impl.cpp"}]}, {"md": "## Step 3: Build the module", "execs": []}, {"md": "### 3.1 Initialize the git repo\n\n```text\nresult\nresult-*\nbuild/\n```", "execs": [{"kind": "file", "cmd": "write .gitignore", "status": "pass", "note": "Wrote .gitignore"}]}, {"md": "```bash\ngit init\n```", "execs": [{"kind": "run", "cmd": "git init", "status": "pass", "exit_code": 0, "output": "hint: Using 'master' as the name for the initial branch. This default branch name\nhint: will change to \"main\" in Git 3.0. To configure the initial branch name\nhint: to use in all of your new repositories, which will suppress this warning,\nhint: call:\nhint:\nhint: \tgit config --global init.defaultBranch <name>\nhint:\nhint: Names commonly chosen instead of 'master' are 'main', 'trunk' and\nhint: 'development'. The just-created branch can be renamed via this command:\nhint:\nhint: \tgit branch -m <name>\nhint:\nhint: Disable this message with \"git config set advice.defaultBranchName false\"\nInitialized empty Git repository in /tmp/doctest-test-at4pnsmb/.git/\n", "note": ""}]}, {"md": "```bash\ngit add -A\n```", "execs": [{"kind": "run", "cmd": "git add -A", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Build, pointing the external input at the local source\n\n`--override-input greet` substitutes our local `greet-src/` for the\nplaceholder github input. In a real project you'd instead `nix flake\nupdate` to lock the real github repo and just run `nix build`.\n\n```bash\n# Real project (greet input points at a real repo):\n#   nix flake update && nix build\n#\n# Self-contained tutorial (local stand-in for the external repo):\nnix build --override-input greet \"path:$PWD/greet-src\"\n```", "execs": [ -co/logos-package-manager#cli-portable' --out-link ./pm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli-portable' --out-link ./pm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nmkdir -p modules\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\n./pm/bin/lgpm --modules-dir ./modules install --file result/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./pm/bin/lgpm --modules-dir ./modules install --file result/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: result/logos-greet_module-module-lib.lgx...Warning: Package is unsigned: result/logos-greet_module-module-lib.lgx\n done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 4.2 Start the portable daemon and call hello()\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli#cli-bundle-dir' --out-link ./logos\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli#cli-bundle-dir' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore -D -m ./modules &\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore -D -m ./modules &", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore load-module greet_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module greet_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"greet_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore call greet_module hello\n```\n\nThe make-built library was linked and loaded \u2014 `hello()` returns the\nstring from `greet_hello()`.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call greet_module hello", "status": "pass", "exit_code": 0, "output": "{\"method\":\"hello\",\"module\":\"greet_module\",\"result\":\"hello from libgreet\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\n./logos/bin/logoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}]}, {"meta": {"name": "Wrapping an External Library \u2014 4. An External Nix Flake", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Wrapping an External Library \u2014 4. An External Nix Flake\n\nThe last of four tutorials on wrapping a C library as a Logos module. All four\nwrap the same `libgreet` (`const char* greet_hello(void)` \u2192 `\"hello from\nlibgreet\"`); they differ in **how the library reaches the build**.\n\nHere the library is already packaged as a **Nix flake** that exposes a package\noutput (a derivation with `lib/` + `include/`). The builder detects a derivation\nand uses it directly \u2014 no `build_command`. This is the cleanest option: the\ndependency is pinned in your `flake.lock` and built reproducibly by Nix.\n\n> In a real project the library is a github flake-input (`greet.url =\n> \"github:org/libgreet-flake\"`). For a self-contained, runnable tutorial we keep\n> the library flake in a local `greet-flake/` directory and point the build at\n> it with `--override-input`.\n\n**What you'll build:** A `greet_module` that consumes a libgreet **package output** from an external Nix flake.\n\n**What you'll learn:**\n\n- How the builder uses a resolved flake package directly (no build step)\n- The structured `externalLibInputs` form that selects a package output\n- The difference from the build-from-source path (Tutorial 3)\n\n## Prerequisites\n\n- **Nix** with flakes enabled.", "execs": []}, {"md": "## Step 1: The external library flake\n\nThis stands in for a separate library **flake**: a header, a source, and a\n`flake.nix` exposing `packages.<system>.lib` \u2014 a derivation with `lib/` and\n`include/`.", "execs": []}, {"md": "```bash\nmkdir greet-module-flake && cd greet-module-flake\n```", "execs": [{"kind": "run", "cmd": "mkdir -p greet-module-flake/greet-flake && cd greet-module-flake", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 1.1 greet-flake/greet.h\n\n```c\n#ifndef GREET_H\n#define GREET_H\n#ifdef __cplusplus\nextern \"C\" {\n#endif\nconst char* greet_hello(void);\n#ifdef __cplusplus\n}\n#endif\n#endif\n```", "execs": [{"kind": "file", "cmd": "write greet-flake/greet.h", "status": "pass", "note": "Wrote greet-flake/greet.h"}]}, {"md": "### 1.2 greet-flake/greet.c\n\n```c\n#include \"greet.h\"\nconst char* greet_hello(void) {\n    return \"hello from libgreet\";\n}\n```", "execs": [{"kind": "file", "cmd": "write greet-flake/greet.c", "status": "pass", "note": "Wrote greet-flake/greet.c"}]}, {"md": "### 1.3 greet-flake/flake.nix\n\nThe library flake builds `libgreet` and exposes it as\n`packages.<system>.lib` with `lib/` + `include/`.\n\n```nix\n{\n  description = \"libgreet packaged as a Nix flake\";\n\n  inputs.nixpkgs.url = \"github:NixOS/nixpkgs/nixpkgs-unstable\";\n\n  outputs = { self, nixpkgs }:\n    let\n      systems = [ \"x86_64-linux\" \"aarch64-linux\" \"x86_64-darwin\" \"aarch64-darwin\" ];\n      forAll = f: nixpkgs.lib.genAttrs systems (s: f (import nixpkgs { system = s; }));\n    in {\n      packages = forAll (pkgs: rec {\n        lib = pkgs.stdenv.mkDerivation {\n          pname = \"libgreet\";\n          version = \"1.0.0\";\n          src = ./.;\n          dontConfigure = true;\n          dontBuild = true;\n          installPhase = ''\n            mkdir -p $out/lib $out/include\n            if [ \"$(uname -s)\" = Darwin ]; then\n              $CC -fPIC -dynamiclib -install_name @rpath/libgreet.dylib \\\n                -o $out/lib/libgreet.dylib greet.c\n            else\n              $CC -fPIC -shared -Wl,-soname,libgreet.so \\\n                -o $out/lib/libgreet.so greet.c\n            fi\n            cp greet.h $out/include/\n          '';\n        };\n        default = lib;\n      });\n    };\n}\n```", "execs": [{"kind": "file", "cmd": "write greet-flake/flake.nix", "status": "pass", "note": "Wrote greet-flake/flake.nix"}]}, {"md": "## Step 2: Write the module", "execs": []}, {"md": "### 2.1 metadata.json\n\nOnly the name is needed \u2014 there is no `build_command`, because the input\nis already built.\n\n```json\n{\n  \"name\": \"greet_module\",\n  \"version\": \"1.0.0\",\n  \"type\": \"core\",\n  \"category\": \"general\",\n  \"description\": \"Greeter module wrapping libgreet from an external Nix flake\",\n  \"main\": \"greet_module_plugin\",\n  \"interface\": \"universal\",\n  \"dependencies\": [],\n\n  \"nix\": {\n    \"packages\": { \"build\": [], \"runtime\": [] },\n    \"external_libraries\": [\n      { \"name\": \"greet\" }\n    ],\n    \"cmake\": {\n      \"find_packages\": [],\n      \"extra_sources\": [],\n      \"extra_include_dirs\": [\"lib\"],\n      \"extra_link_libraries\": []\n    }\n  }\n}\n```", "execs": [{"kind": "file", "cmd": "write metadata.json", "status": "pass", "note": "Wrote metadata.json"}]}, {"md": "### 2.2 CMakeLists.txt\n\n```cmake\ncmake_minimum_required(VERSION 3.14)\nproject(GreetModulePlugin LANGUAGES CXX)\n\nif(DEFINED ENV{LOGOS_MODULE_BUILDER_ROOT})\n    include($ENV{LOGOS_MODULE_BUILDER_ROOT}/cmake/LogosModule.cmake)\nelseif(EXISTS \"${CMAKE_CURRENT_SOURCE_DIR}/cmake/LogosModule.cmake\")\n    include(cmake/LogosModule.cmake)\nelse()\n    message(FATAL_ERROR \"LogosModule.cmake not found\")\nendif()\n\nlogos_module(\n    NAME greet_module\n    SOURCES\n        src/greet_module_impl.h\n        src/greet_module_impl.cpp\n    EXTERNAL_LIBS\n        greet\n)\n```", "execs": [{"kind": "file", "cmd": "write CMakeLists.txt", "status": "pass", "note": "Wrote CMakeLists.txt"}]}, {"md": "### 2.3 flake.nix\n\nAdd the library flake as an input and select the output with the\n**structured** `externalLibInputs` form (`input` + `packages`).\n\n```nix\n{\n  description = \"Greeter module - wraps libgreet from an external Nix flake\";\n\n  inputs = {\n    logos-module-builder.url = \"github:logos-co/logos-module-builder/84630f4b6ff14d14114b29c34608b21e46a225ed\";\n    greet.url = \"github:example/libgreet-flake\";\n  };\n\n  outputs = inputs@{ logos-module-builder, ... }:\n    logos-module-builder.lib.mkLogosModule {\n      src = ./.;\n      configFile = ./metadata.json;\n      flakeInputs = inputs;\n      externalLibInputs = {\n        greet = {\n          input = inputs.greet;\n          packages.default = \"lib\";\n        };\n      };\n    };\n}\n```", "execs": [{"kind": "file", "cmd": "write flake.nix", "status": "pass", "note": "Wrote flake.nix"}]}, {"md": "### 2.4 src/greet_module_impl.h\n\n```cpp\n#pragma once\n\n#include <string>\n#include <logos_module_context.h>\n\nextern \"C\" {\n    #include \"lib/greet.h\"\n}\n\nclass GreetModuleImpl : public LogosModuleContext {\npublic:\n    GreetModuleImpl() = default;\n    ~GreetModuleImpl() = default;\n\n    /// Returns the greeting string from the wrapped libgreet library.\n    std::string hello();\n};\n```", "execs": [{"kind": "file", "cmd": "write src/greet_module_impl.h", "status": "pass", "note": "Wrote src/greet_module_impl.h"}]}, {"md": "### 2.5 src/greet_module_impl.cpp\n\n```cpp\n#include \"greet_module_impl.h\"\n\nstd::string GreetModuleImpl::hello()\n{\n    return std::string(greet_hello());\n}\n```", "execs": [{"kind": "file", "cmd": "write src/greet_module_impl.cpp", "status": "pass", "note": "Wrote src/greet_module_impl.cpp"}]}, {"md": "## Step 3: Build the module", "execs": []}, {"md": "### 3.1 Initialize the git repo\n\n```text\nresult\nresult-*\nbuild/\n```", "execs": [{"kind": "file", "cmd": "write .gitignore", "status": "pass", "note": "Wrote .gitignore"}]}, {"md": "```bash\ngit init\n```", "exe <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
